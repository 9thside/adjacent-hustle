              - {label: "Line 1 (faded)", name: line1, widget: string}
              - {label: "Line 2 (bold)", name: line2, widget: string}
              - {label: Body Text, name: body, widget: text}
              - {label: CTA Button, name: cta, widget: string}
              - {label: Stat Number, name: statNumber, widget: string}
              - {label: Stat Label, name: statLabel, widget: string}
              - {label: Stat Source, name: statSource, widget: string}
          - label: Services Section
