backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: pages
    label: Pages
    files:
      - name: home
        label: Home Page
        file: public/content/index.json
        format: json
        fields:
          - label: Hero Section
            name: hero
            widget: object
            fields:
              - {label: Eyebrow Text, name: eyebrow, widget: string, hint: "Small text above headline"}
              - {label: Headline, name: headline, widget: string}
              - {label: Subheadline, name: subheadline, widget: text}
              - {label: Primary CTA Button, name: cta1, widget: string}
              - {label: Secondary CTA Button, name: cta2, widget: string}
          - label: Credibility Strip
            name: credibilityStrip
            widget: object
            fields:
              - {label: Quote Text, name: quote, widget: text}
              - {label: Attribution Name, name: attribution, widget: string}
              - {label: Attribution Role, name: attributionRole, widget: string}
              - {label: Industry Tag 1, name: tag1, widget: string}
              - {label: Industry Tag 2, name: tag2, widget: string}
              - {label: Industry Tag 3, name: tag3, widget: string}
              - {label: Industry Tag 4, name: tag4, widget: string}
              - {label: Industry Tag 5, name: tag5, widget: string}
          - label: Statement Section
            name: statement
